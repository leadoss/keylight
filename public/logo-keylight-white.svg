<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80" fill="none">
  <!-- Lightbulb icon -->
  <g transform="translate(0, 2)">
    <!-- Bulb body (yellow) -->
    <path d="M28 8C17.5 8 9 16.5 9 27c0 6.5 3.2 12 8 15.5V50c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2v-7.5c4.8-3.5 8-9 8-15.5C47 16.5 38.5 8 28 8z" fill="#FFD400"/>
    <!-- Filament lines -->
    <path d="M22 30c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#0A0A0A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <line x1="22" y1="30" x2="22" y2="42" stroke="#0A0A0A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="34" y1="30" x2="34" y2="42" stroke="#0A0A0A" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Base rings -->
    <rect x="19" y="52" width="18" height="4" rx="1" fill="#FFFFFF"/>
    <rect x="19" y="58" width="18" height="4" rx="1" fill="#FFFFFF"/>
    <!-- Screw tip -->
    <path d="M23 62h10l-2 8h-6l-2-8z" fill="#FFFFFF"/>
    <!-- Light rays -->
    <line x1="28" y1="0" x2="28" y2="4" stroke="#FFD400" stroke-width="3" stroke-linecap="round"/>
    <line x1="5" y1="12" x2="8" y2="15" stroke="#FFD400" stroke-width="3" stroke-linecap="round"/>
    <line x1="51" y1="12" x2="48" y2="15" stroke="#FFD400" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="27" x2="4" y2="27" stroke="#FFD400" stroke-width="3" stroke-linecap="round"/>
    <line x1="56" y1="27" x2="52" y2="27" stroke="#FFD400" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- KEYLIGHT text (white for dark backgrounds) -->
  <text x="72" y="46" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="42" letter-spacing="3" fill="#FFFFFF">KEYLIGHT</text>
  <!-- LIGHTING PRODUCTS subtitle -->
  <text x="74" y="66" font-family="Arial, sans-serif" font-weight="400" font-size="14" letter-spacing="5" fill="#FFFFFF">LIGHTING PRODUCTS</text>
</svg>
